<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiziQ 專業易經排盤系統</title>
    <style>
        :root {
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --accent-color: #000000;
            --highlight-bg: #F9FAFB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 32px; font-weight: 700; margin: 0 0 12px 0; letter-spacing: 2px; }
        .header p { color: var(--text-muted); font-size: 15px; margin: 0; font-weight: 300; }

        .container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 24px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); padding: 40px; }

        /* 頁籤導覽 */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; color: var(--text-muted); cursor: pointer; font-weight: 500; width: auto; transition: all 0.2s; }
        .tab-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); font-weight: 700; }

        .panel { display: none; }
        .panel.active { display: block; }

        /* 數理起卦佈局 */
        .input-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 13px; color: var(--text-muted); font-weight: 500; text-align: center; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 18px; text-align: center; box-sizing: border-box; background-color: var(--highlight-bg); }

        /* 硬幣起卦佈局 */
        .coin-flow { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 30px; }
        .coin-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .coin-btn { background-color: var(--highlight-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 8px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .coin-btn:hover { border-color: var(--text-main); }
        .history-list { display: flex; flex-direction: column-reverse; gap: 6px; width: 100%; background: var(--highlight-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); min-height: 50px; }
        .history-item { font-size: 14px; color: var(--text-muted); display: flex; justify-content: space-between; }

        button.main-btn { width: 100%; padding: 16px; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button.main-btn:hover { opacity: 0.85; }

        /* 結果區佈局 */
        .result-area { display: none; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 40px; }
        .hexagram-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .hexagram-box { display: flex; flex-direction: column; align-items: center; padding: 24px; background-color: var(--highlight-bg); border-radius: 12px; border: 1px solid var(--border-color); }
        .gua-badge { font-size: 12px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 8px; }
        .gua-title { font-size: 26px; font-weight: 700; margin-bottom: 30px; }

        /* 卦象繪製 */
        .yao-container { display: flex; flex-direction: column-reverse; align-items: center; gap: 10px; width: 100%; }
        .yao { height: 14px; width: 120px; position: relative; border-radius: 3px; }
        .yang { background-color: var(--text-main); }
        .yin { background-color: transparent; display: flex; justify-content: space-between; }
        .yin::before, .yin::after { content: ""; width: 42%; height: 100%; background-color: var(--text-main); border-radius: 3px; }
        
        .moving-indicator { position: absolute; right: -30px; top: -2px; color: #DC2626; font-size: 14px; font-weight: bold; }
        .moving-yao { outline: 2px solid #E5E7EB; outline-offset: 6px; border-radius: 3px; }
        .summary { text-align: center; margin-top: 30px; font-size: 15px; color: var(--text-muted); line-height: 1.6; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LiziQ 排盤系統</h1>
        <p>專業數位占卜工具</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('numeric')">數理起卦</button>
                <button class="tab-btn" onclick="switchTab('coin')">三錢占卜 (硬幣法)</button>
            </div>

            <div id="numericPanel" class="panel active">
                <div class="input-row">
                    <div class="input-group"><label>上卦數 (外在)</label><input type="number" id="num1" placeholder="0"></div>
                    <div class="input-group"><label>下卦數 (內在)</label><input type="number" id="num2" placeholder="0"></div>
                    <div class="input-group"><label>動爻數 (變數)</label><input type="number" id="num3" placeholder="0"></div>
                </div>
                <button class="main-btn" onclick="calculateNumericGua()">解析數理卦</button>
            </div>

            <div id="coinPanel" class="panel">
                <div class="coin-flow">
                    <label style="font-size: 14px; color: var(--text-muted);">請由下往上，依序記錄六次硬幣擲出結果：</label>
                    <div class="coin-options">
                        <button class="coin-btn" onclick="addCoinYao(7)">⚪ ⚪ ⚫<br>1正2反 (少陽)</button>
                        <button class="coin-btn" onclick="addCoinYao(8)">⚫ ⚫ ⚪<br>2正1反 (少陰)</button>
                        <button class="coin-btn" onclick="addCoinYao(9)">⚪ ⚪ ⚪<br>3個正面 (老陽 ✕)</button>
                        <button class="coin-btn" onclick="addCoinYao(6)">⚫ ⚫ ⚫<br>3個反面 (老陰 ✕)</button>
                    </div>
                    <div class="history-list" id="coinHistory">
                        <div style="text-align: center; color: #9CA3AF; font-size: 14px; width:100%;">暫無記錄，請點選上方硬幣結果</div>
                    </div>
                    <button class="main-btn" style="background-color: #6B7280;" onclick="resetCoin()">重置硬幣紀錄</button>
                </div>
            </div>

            <div id="resultArea" class="result-area">
                <div class="hexagram-grid">
                    <div class="hexagram-box">
                        <div class="gua-badge">Main Hexagram</div>
                        <div class="gua-title" id="mainGuaName"></div>
                        <div id="mainGuaVisual" class="yao-container"></div>
                    </div>
                    <div class="hexagram-box">
                        <div class="gua-badge">Transformed</div>
                        <div class="gua-title" id="transGuaName"></div>
                        <div id="transGuaVisual" class="yao-container"></div>
                    </div>
                </div>
                <div class="summary" id="guaDesc"></div>
            </div>
        </div>
    </div>

<script>
    // 64 卦字典
    const gua64 = {
        "乾乾":"乾為天", "乾坤":"天地否", "乾震":"天雷無妄", "乾巽":"天風姤", "乾坎":"天水訟", "乾離":"天火同人", "乾艮":"天山遯", "乾兌":"天澤履",
        "坤乾":"地天泰", "坤坤":"坤為地", "坤震":"地雷復", "坤巽":"地風升", "坤坎":"地水師", "坤離":"地火明夷", "坤艮":"地山謙", "坤兌":"地澤臨",
        "震乾":"雷天大壯", "震坤":"雷地豫", "震震":"震為雷", "震巽":"雷風恆", "震坎":"雷水解", "震離":"雷火豐", "震艮":"雷山小過", "震兌":"雷澤歸妹",
        "巽乾":"風天小畜", "巽坤":"風地觀", "巽震":"風雷益", "巽巽":"巽為風", "巽坎":"風水渙", "巽離":"風火家人", "巽艮":"風山漸", "巽兌":"風澤中孚",
        "坎乾":"水天需", "坎坤":"水地比", "坎震":"水雷屯", "坎巽":"水風井", "坎坎":"坎為水", "坎離":"水火既濟", "坎艮":"水山蹇", "坎兌":"水澤節",
        "離乾":"火天大有", "離坤":"火地晉", "離震":"火雷噬嗑", "離巽":"火風鼎", "離坎":"火水未濟", "離離":"離為火", "離艮":"火山旅", "離兌":"火澤睽",
        "艮乾":"山天大畜", "艮坤":"山地剝", "艮震":"山雷頤", "艮巽":"山風蠱", "艮坎":"山水蒙", "艮離":"山火賁", "艮艮":"艮為山", "艮兌":"山澤損",
        "兌乾":"澤天夬", "兌坤":"澤地萃", "兌震":"澤雷隨", "兌巽":"澤風大過", "兌坎":"澤水困", "兌離":"澤火革", "兌艮":"澤山咸", "兌兌":"兌為澤"
    };
    const bagua = [
        { name: "坤", yao: [0,0,0] }, { name: "乾", yao: [1,1,1] }, { name: "兌", yao: [1,1,0] },
        { name: "離", yao: [1,0,1] }, { name: "震", yao: [1,0,0] }, { name: "巽", yao: [0,1,1] },
        { name: "坎", yao: [0,1,0] }, { name: "艮", yao: [0,0,1] }
    ];

    let coinYaoRecord = []; // 儲存硬幣 6,7,8,9 的紀錄

    function switchTab(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('resultArea').style.display = 'none';

        if(type === 'numeric') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('numericPanel').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('coinPanel').classList.add('active');
        }
    }

    function getBaguaName(yao3) {
        for (let b of bagua) {
            if (b.yao[0]===yao3[0] && b.yao[1]===yao3[1] && b.yao[2]===yao3[2]) return b.name;
        }
        return "";
    }

    // 1. 處理原本的數理起卦
    function calculateNumericGua() {
        const n1 = parseInt(document.getElementById('num1').value);
        const n2 = parseInt(document.getElementById('num2').value);
        const n3 = parseInt(document.getElementById('num3').value);
        if (isNaN(n1) || isNaN(n2) || isNaN(n3)) return alert("請輸入完整數字");

        const upperIdx = n1 % 8; const lowerIdx = n2 % 8;
        const moveYao = (n3 % 6 === 0) ? 6 : (n3 % 6);

        let mainYao = [...bagua[lowerIdx].yao, ...bagua[upperIdx].yao];
        let transYao = [...mainYao];
        transYao[moveYao - 1] = transYao[moveYao - 1] === 1 ? 0 : 1;

        displayGuaResult(mainYao, transYao, [moveYao - 1]);
    }

    // 2. 處理硬幣點選紀錄
    function addCoinYao(type) {
        if (coinYaoRecord.length >= 6) return;
        coinYaoRecord.push(type);
        
        // 更新歷史紀錄顯示
        const historyBox = document.getElementById('coinHistory');
        if (coinYaoRecord.length === 1) historyBox.innerHTML = "";
        
        const names = { 7: "少陽 (—)", 8: "少陰 (- -)", 9: "老陽 (— ✕ 動爻)", 6: "老陰 (- - ✕ 動爻)" };
        const div = document.createElement('div');
        div.className = "history-item";
        div.innerHTML = `<span>第 ${coinYaoRecord.length} 爻:</span> <strong>${names[type]}</strong>`;
        historyBox.appendChild(div);

        // 集滿六爻，自動排盤
        if (coinYaoRecord.length === 6) {
            // 7和9是陽爻，8和6是陰爻
            let mainYao = coinYaoRecord.map(v => (v === 7 || v === 9) ? 1 : 0);
            // 9(老陽)變陰(0)，6(老陰)變陽(1)，7和8保持不變
            let transYao = coinYaoRecord.map(v => {
                if (v === 9) return 0;
                if (v === 6) return 1;
                return (v === 7) ? 1 : 0;
            });

            // 找出所有動爻的索引 (0~5)
            let movingIndices = [];
            coinYaoRecord.forEach((v, idx) => { if(v===6 || v===9) movingIndices.push(idx); });

            displayGuaResult(mainYao, transYao, movingIndices);
        }
    }

    function resetCoin() {
        coinYaoRecord = [];
        document.getElementById('coinHistory').innerHTML = `<div style="text-align: center; color: #9CA3AF; font-size: 14px; width:100%;">暫無記錄，請點選上方硬幣結果</div>`;
        document.getElementById('resultArea').style.display = 'none';
    }

    // 3. 核心渲染與解卦驅動
    function displayGuaResult(mainYao, transYao, movingIndices) {
        let lowerMain = getBaguaName(mainYao.slice(0,3));
        let upperMain = getBaguaName(mainYao.slice(3,6));
        let lowerTrans = getBaguaName(transYao.slice(0,3));
        let upperTrans = getBaguaName(transYao.slice(3,6));

        let nameMain = gua64[upperMain + lowerMain];
        let nameTrans = gua64[upperTrans + lowerTrans];

        document.getElementById('mainGuaName').innerText = nameMain;
        document.getElementById('transGuaName').innerText = nameTrans;

        // 渲染圖形
        renderGuaVisual("mainGuaVisual", mainYao, movingIndices, true);
        renderGuaVisual("transGuaVisual", transYao, [], false);

        // 動爻文字解讀提示
        let desc = `本卦為「${nameMain}」，化為變卦「${nameTrans}」。<br>`;
        if (movingIndices.length === 0) {
            desc += "💡 提示：此卦【無動爻】，解卦時請以『本卦卦辭』為主，參考靜態現況。";
        } else {
            let displayNums = movingIndices.map(i => i + 1);
            desc += `💡 提示：當前共有 ${movingIndices.length} 個動爻（第 ${displayNums.join(', ')} 爻發動）。`;
        }
        document.getElementById('guaDesc').innerHTML = desc;
        document.getElementById('resultArea').style.display = 'block';
    }

    function renderGuaVisual(elementId, yaoArr, movingIndices, isMain) {
        const container = document.getElementById(elementId);
        container.innerHTML = "";
        yaoArr.forEach((y, index) => {
            const div = document.createElement('div');
            let classes = `yao ${y === 1 ? 'yang' : 'yin'}`;
            
            if (isMain && movingIndices.includes(index)) {
                classes += ' moving-yao';
                const ind = document.createElement('span');
                ind.className = 'moving-indicator';
                ind.innerText = '✕';
                div.appendChild(ind);
            }
            div.className = classes;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
