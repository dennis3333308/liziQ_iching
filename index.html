<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiziQ 易經起卦系統</title>
    <style>
        /* 極簡風 UI 規範 */
        :root {
            --bg-color: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --accent-color: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 600; margin: 0 0 10px 0; letter-spacing: 1px; }
        .header p { color: var(--text-muted); font-size: 14px; margin: 0; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--text-main); }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }

        /* 卦象視覺化 */
        .result-area { display: none; text-align: center; margin-top: 20px; }
        .gua-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        
        .yao-container { display: flex; flex-direction: column-reverse; align-items: center; gap: 8px; margin-bottom: 20px; }
        .yao { height: 12px; width: 100px; position: relative; border-radius: 2px; }
        .yang { background-color: var(--text-main); }
        .yin { background-color: transparent; display: flex; justify-content: space-between; }
        .yin::before, .yin::after { content: ""; width: 44%; height: 100%; background-color: var(--text-main); border-radius: 2px; }
        .moving-yao { outline: 2px solid #D1D5DB; outline-offset: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LiziQ 易經系統</h1>
        <p>極簡・直覺・探尋天機</p>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="number" id="num1" placeholder="輸入第一個數字 (上卦)">
            <input type="number" id="num2" placeholder="輸入第二個數字 (下卦)">
            <input type="number" id="num3" placeholder="輸入第三個數字 (動爻)">
        </div>
        <button onclick="calculateGua()">起卦分析</button>

        <div id="resultArea" class="result-area">
            <div class="gua-title" id="mainGuaName"></div>
            <div id="mainGuaVisual" class="yao-container"></div>
            <p id="guaDesc" style="color: var(--text-muted); font-size: 14px; margin-top: 15px;"></p>
        </div>
    </div>

<script>
    const bagua = [
        { name: "坤", yao: [0,0,0] }, { name: "乾", yao: [1,1,1] }, { name: "兌", yao: [1,1,0] },
        { name: "離", yao: [1,0,1] }, { name: "震", yao: [1,0,0] }, { name: "巽", yao: [0,1,1] },
        { name: "坎", yao: [0,1,0] }, { name: "艮", yao: [0,0,1] }
    ];

    function calculateGua() {
        const n1 = parseInt(document.getElementById('num1').value);
        const n2 = parseInt(document.getElementById('num2').value);
        const n3 = parseInt(document.getElementById('num3').value);

        if (isNaN(n1) || isNaN(n2) || isNaN(n3)) {
            alert("請輸入三個完整的數字");
            return;
        }

        const upperIdx = n1 % 8;
        const lowerIdx = n2 % 8;
        const moveYao = (n3 % 6 === 0) ? 6 : (n3 % 6);

        let mainYao = [...bagua[lowerIdx].yao, ...bagua[upperIdx].yao];
        
        renderGua("mainGuaVisual", mainYao, moveYao);
        
        document.getElementById('mainGuaName').innerText = `本卦：${bagua[upperIdx].name}${bagua[lowerIdx].name}`;
        document.getElementById('guaDesc').innerText = `動爻在第 ${moveYao} 爻`;
        document.getElementById('resultArea').style.display = 'block';
    }

    function renderGua(elementId, yaoArr, moveYao) {
        const container = document.getElementById(elementId);
        container.innerHTML = "";
        yaoArr.forEach((y, index) => {
            const div = document.createElement('div');
            div.className = `yao ${y === 1 ? 'yang' : 'yin'} ${index === moveYao - 1 ? 'moving-yao' : ''}`;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
